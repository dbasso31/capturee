<script type="text/javascript">


//AUDIO
function loadPlayer() {
	var audioPlayerVal = new Audio();
	audioPlayerVal.controls="controls";
	audioPlayerVal.autoplay="autoplay";
	audioPlayerVal.volume=1;
	audioPlayerVal.addEventListener('ended',superbgimage_click,true);
	audioPlayerVal.addEventListener('error',errorFallback,true);
	//audioPlayerVal.addEventListener('ended', alert("fini"));
	document.getElementById("audioplayer").appendChild(audioPlayerVal);
	nextSong();
}
function nextSong() {
	if(urlsong!='vide') {
		var audioPlayerVal = document.getElementsByTagName('audio')[0];
		if(audioPlayerVal!=undefined) {
			audioPlayerVal.volume=1;
			audioPlayerVal.src=urlsong;
			audioPlayerVal.load();
			audioPlayerVal.play();
		} else {
			loadPlayer();
		}
	} else {
		alert('the end!');
	}
}
function errorFallback() {
		nextSong();
}
function playPause() {
	var audioPlayerVal = document.getElementsByTagName('audio')[0];
	if(audioPlayerVal!=undefined) {
		if (audioPlayerVal.paused) {
			audioPlayerVal.play();
		} else {
			audioPlayerVal.pause();
		}
	} else {
		loadPlayer();
	}
}
function pickSong(num) {
	next = num;
	nextSong();
}

var urlsong = 'vide';



////////////////////////

function setActiveStyleSheet(title) {
   var i, a, main;
   for(i=0; (a = document.getElementsByTagName("link")[i]); i++) {
     if(a.getAttribute("rel").indexOf("style") != -1
        && a.getAttribute("title")) {
       a.disabled = true;
       if(a.getAttribute("title") == title) a.disabled = false;
     }
   }
 	document.getElementById("imgPREV").src = "assets/previous2.gif";
	document.getElementById("imgNEXT").src = "assets/next2.gif";
}

$(function() {

	// Options for SuperBGImage
		$.fn.superbgimage.options = {
		id: 'superbgimage', // id for the containter
		z_index: 0, // z-index for the container
		inlineMode: 0, // 0-resize to browser size, 1-do not resize to browser-size
		showimage: 1, // number of first image to display
		vertical_center: 0, // 0-align top, 1-center vertical
		transition: 91, // 0-none, 1-fade, 2-slide down, 3-slide left, 4-slide top, 5-slide right, 6-blind horizontal, 7-blind vertical, 90-slide right/left, 91-slide top/down
		transitionout: 1, // 0-no transition for previous image, 1-transition for previous image
		randomtransition: 0, // 0-none, 1-use random transition (0-7)
		showtitle: 0, // 0-none, 1-show title
		slideshow: 0, // 0-none, 1-autostart slideshow
		slide_interval: 50000, // interval for the slideshow
		randomimage: 0, // 0-none, 1-random image
		speed: 'slow', // animation speed
		preload: 1, // 0-none, 1-preload images
		onShow: superbgimage_show, // function-callback show image
		onClick: superbgimage_click, // function-callback click image
		onHide: superbgimage_hide, // function-callback hide image
		onMouseenter: superbgimage_mouseenter, // function-callback mouseenter
		onMouseleave: superbgimage_mouseleave, // function-callback mouseleave
		onMousemove: superbgimage_mousemove // function-callback mousemove
	};

	// initialize SuperBGImage
	$('#thumbs1').superbgimage();
	if( navigator.userAgent.match(/webOS/i) || navigator.userAgent.match(/iPhone/i) || navigator.userAgent.match(/iPod/i) || navigator.userAgent.match(/iPad/i) || ('ontouchstart' in window)){
		showPopOver('pop2');
	}﻿

});

// function callback on hiding image
function superbgimage_hide(img) {
	$('#showtitle').hide();
}

// function callback on showing image
// get title and display it
function superbgimage_show(img) {
		
	$('.prev').css("visibility",'visible');
	$('.next').css("visibility",'visible');
	$('#superbgimage').append($('#showtitle'));
	$('a.imagecount').html(/*'image ' +*/ img /*+ ' of ' + $.superbg_imgIndex*/);
	$('a.title').fadeIn('fast');
	
	var songURL= "audio/" + $('#thumbs1 a' + "[rel='" + img + "']").attr('song') + ".mp3";
	setActiveStyleSheet('cssCADRE');
	
	urlsong = songURL;
	nextSong();
	
}

// function callback on clicking image, show next slide
function superbgimage_click(img) {
	$('#thumbs').nextSlide();
}

my_slideshowActive = false;

// function callback onmouseenter, stop slideshow, show pause-indicator
function superbgimage_mouseenter(img) {
	if ($.superbg_slideshowActive) {
		my_slideshowActive = true;
		if ($('#pause').length == 0) { 
			$('body').prepend('<div id="pause"><img src="pause.png" \/><\/div>');
		}
		$('#pause').css('position', 'absolute').css('z-index', 3).show();
		return $('#thumbs').stopSlideShow();
	}
}

// function callback onmouseleave, start slideshow, hide pause-indicator
function superbgimage_mouseleave(img) {
	if (my_slideshowActive && ($('#pause').length > 0) && ($('#pause').css('display') == 'block'))  { 
		$('#pause').hide();
		return $('#thumbs').startSlideShow();
	}	
}

// function callback onmousemove, show and move pause-indicator
function superbgimage_mousemove(img, e) {
	if (my_slideshowActive && ($('#pause').length > 0)) { 
		$("#pause").css("top",(e.pageY + 20) + "px").css("left",(e.pageX + 20) + "px").show();
	}
}
